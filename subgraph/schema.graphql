type User @entity(immutable: true) {
  id: ID!
  address: String!
  scw: Bytes! # respective smart contract wallet address for the user
  profiles: [Profile!]! @derivedFrom(field: "eoa")
  createdAt: BigInt!
}

type Profile @entity(immutable: false) {
  id: ID!
  tokenId: BigInt!
  name: String!
  handle: String!
  category: String!
  bio: String
  avatar: String
  linkKeys: [String!]!
  links: [String!]!
  settingsHash: String! # hash of the appearance settings
  owner: Bytes! # The address that created the profile
  eoa: User! # The user that owns the profile
  tipAmount: BigInt! # total amount of tips received by the profile
  posts: [Post!]! @derivedFrom(field: "author")
  notes: [Note!]! @derivedFrom(field: "to")
  createdAt: BigInt!
  updatedAt: BigInt!
}

type Note @entity(immutable: true) {
  # The ID of the note is a combination of the profile ID and the note ID
  id: ID! 
  to: Profile! # to which profile the note belongs
  content: String!
  author: Bytes! # who created the note
  tipAmount: BigInt! # amount of tip sent with the note
  txHash: String! # transaction hash of the note creation
  createdAt: BigInt!
}

type Post @entity(immutable: true) {
  # The ID of the post is a combination of the profile ID and the post ID
  id: ID!
  content: String!
  author: Profile! # who created the post
  createdAt: BigInt!
}