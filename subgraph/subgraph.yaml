specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: LinkFolio
    network: nero-evm-testnet
    source:
      address: "0xb2eF0B385FcEE4a54F097c37761AAc4BB4D98C4A"
      abi: LinkFolio
      startBlock: 7258429
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Profile
        - User
        - Note
        - Post
      abis:
        - name: LinkFolio
          file: ./abis/LinkFolio.json
      eventHandlers:
        - event: ProfileCreated(indexed uint256,string,string,uint8,string,string,address,address,string[],string[])
          handler: handleProfileCreated
        - event: ProfileDeleted(indexed uint256,string)
          handler: handleProfileDeleted
        - event: ProfileUpdated(indexed uint256,string,string,uint8,string,string,address,string[],string[])
          handler: handleProfileUpdated
        - event: NoteLeft(indexed uint256,string,uint256,string,address)
          handler: handleNoteLeft
        - event: PostCreated(indexed uint256,string,uint256,string,address)
          handler: handlePostCreated
      file: ./src/mapping.ts
