specVersion: 1.3.0
description: LinkFolio Subgraph
repository: https://github.com/Salmandabbakuti/linkfolio
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: LinkFolio
    network: polygon-amoy
    source:
      address: "0xfaF07923E3Ed82A432C7F7b2B6A976D0d38817fE"
      abi: LinkFolio
      startBlock: 27806023
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Profile
        - User
        - Note
        - Post
      abis:
        - name: LinkFolio
          file: ./abis/LinkFolio.json
      eventHandlers:
        - event: ProfileCreated(indexed uint256,string,string,uint8,string,string,address,string[],string[],string)
          handler: handleProfileCreated
        - event: ProfileDeleted(indexed uint256,string)
          handler: handleProfileDeleted
        - event: ProfileUpdated(indexed uint256,string,string,uint8,string,string,address,string[],string[],string)
          handler: handleProfileUpdated
        - event: NoteLeft(indexed uint256,string,uint256,string,address,uint256)
          handler: handleNoteLeft
        - event: PostCreated(indexed uint256,string,uint256,string,address)
          handler: handlePostCreated
      file: ./src/mapping.ts
